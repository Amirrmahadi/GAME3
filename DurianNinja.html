<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- This meta tag is crucial for mobile games to prevent zooming -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Durian Ninja</title>
    <!-- Tone.js for sound generation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #2c3e50;
            font-family: 'Fredoka One', 'Comic Sans MS', cursive, sans-serif;
            touch-action: none; /* Prevents mobile scrolling and zooming */
        }

        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
            touch-action: none; /* Crucial for swipe mechanics on mobile */
        }

        /* --- KID FRIENDLY UI OVERLAYS --- */
        #uiLayer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* Let clicks pass through to canvas */
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .hud {
            display: none;
            padding: 20px;
            justify-content: space-between;
            font-size: 32px;
            color: #FFF;
            text-shadow: 3px 3px 0 #000, -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000;
        }

        #scoreBoard { color: #FFD700; }
        #livesBoard { color: #FF4500; }

        /* MAIN MENU - Bouncy & Bright */
        #menu {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, #85C1E9 0%, #2874A6 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
            z-index: 10;
        }

        .title-container {
            text-align: center;
            margin-bottom: 40px;
            animation: float 3s ease-in-out infinite;
        }

        .title-main {
            font-size: 70px;
            color: #FFD700; /* Durian Yellow */
            text-shadow: 5px 5px 0px #228B22, 0 0 20px rgba(255, 215, 0, 0.8);
            margin: 0;
            letter-spacing: 2px;
            line-height: 1;
        }
        
        .title-sub {
            font-size: 40px;
            color: #32CD32; /* Durian Green */
            text-shadow: 3px 3px 0px #006400;
            margin: -10px 0 0 0;
        }

        .play-btn {
            background-color: #FF8C00;
            color: white;
            border: 6px solid #FFF;
            border-radius: 40px;
            padding: 20px 60px;
            font-size: 45px;
            font-family: 'Fredoka One', cursive;
            cursor: pointer;
            box-shadow: 0 10px 0 #B8420F, 0 15px 20px rgba(0,0,0,0.4);
            transition: all 0.1s;
            animation: pulse 1.5s infinite;
        }

        .play-btn:active {
            transform: translateY(10px);
            box-shadow: 0 0px 0 #B8420F, 0 5px 10px rgba(0,0,0,0.4);
        }

        #gameOverScreen {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8);
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
            z-index: 10;
            text-align: center;
        }

        .game-over-title {
            font-size: 60px;
            color: #FF6347;
            text-shadow: 4px 4px 0 #000;
            margin-bottom: 10px;
            animation: float 2s infinite;
        }

        .final-score {
            font-size: 40px;
            color: #FFD700;
            text-shadow: 3px 3px 0 #000;
            margin-bottom: 30px;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08); }
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <div id="uiLayer">
        <div class="hud" id="hud">
            <div id="scoreBoard">Score: 0</div>
            <div id="livesBoard">Lives: 3 💛</div>
        </div>
    </div>

    <!-- Kid Friendly Main Menu -->
    <div id="menu">
        <div class="title-container">
            <h1 class="title-main">DURIAN</h1>
            <h2 class="title-sub">NINJA!</h2>
        </div>
        <button class="play-btn" id="startBtn">PLAY!</button>
    </div>

    <!-- Game Over Screen -->
    <div id="gameOverScreen">
        <h1 class="game-over-title">OH NO!</h1>
        <div class="final-score" id="finalScoreDisplay">You Scored: 0</div>
        <button class="play-btn" id="restartBtn">PLAY AGAIN</button>
    </div>

<script>
/** 
 * GAME ENGINE & LOGIC 
 */
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let width, height;

// UI Elements
const menu = document.getElementById('menu');
const hud = document.getElementById('hud');
const scoreBoard = document.getElementById('scoreBoard');
const livesBoard = document.getElementById('livesBoard');
const gameOverScreen = document.getElementById('gameOverScreen');
const finalScoreDisplay = document.getElementById('finalScoreDisplay');
const startBtn = document.getElementById('startBtn');
const restartBtn = document.getElementById('restartBtn');

// Resize handler
function resize() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// Game State
let isPlaying = false;
let score = 0;
let lives = 3;
let fruits = [];
let particles = [];
let frame = 0;

// Difficulty Scaling Variables
let spawnRate = 100; 
let bombChance = 0.1;
let gravity = 0.15;
let jumpVelocityMin = 12;
let jumpVelocityMax = 18;

// Input (Blade) State
let isSlicing = false;
let bladeTrail = [];
const MAX_TRAIL = 10;

/** 
 * AUDIO SYSTEM (Tone.js) 
 */
let bgm, swooshSynth, splatSynth, boomSynth;

function initAudio() {
    // Upbeat background track
    bgm = new Tone.PolySynth(Tone.Synth).toDestination();
    bgm.volume.value = -12;
    const melody = ["C4", "E4", "G4", "A4", "C5", "A4", "G4", "E4"];
    let noteIndex = 0;
    
    Tone.Transport.scheduleRepeat(time => {
        if(isPlaying) {
            bgm.triggerAttackRelease(melody[noteIndex % melody.length], "8n", time);
            noteIndex++;
        }
    }, "8n");
    Tone.Transport.bpm.value = 160;

    // Sound Effects
    swooshSynth = new Tone.NoiseSynth({
        noise: { type: "pink" },
        envelope: { attack: 0.01, decay: 0.1, sustain: 0 }
    }).toDestination();
    swooshSynth.volume.value = -15;

    splatSynth = new Tone.MembraneSynth().toDestination();
    splatSynth.volume.value = -5;

    boomSynth = new Tone.FMSynth().toDestination();
    boomSynth.volume.value = 0;
}

function playSwoosh() { if(Tone.context.state === 'running') swooshSynth.triggerAttackRelease("16n"); }
function playSplat() { if(Tone.context.state === 'running') splatSynth.triggerAttackRelease("C2", "8n"); }
function playBoom() { if(Tone.context.state === 'running') boomSynth.triggerAttackRelease("C1", "2n"); }

/**
 * INPUT HANDLING (Unified Mouse & Mobile Touch)
 */
function updateBlade(x, y) {
    bladeTrail.push({x, y});
    if (bladeTrail.length > MAX_TRAIL) {
        bladeTrail.shift();
    }
    checkCollisions();
}

// MOUSE
canvas.addEventListener('mousedown', (e) => { isSlicing = true; bladeTrail = []; updateBlade(e.clientX, e.clientY); });
canvas.addEventListener('mousemove', (e) => { if (isSlicing) updateBlade(e.clientX, e.clientY); });
canvas.addEventListener('mouseup', () => { isSlicing = false; bladeTrail = []; });
canvas.addEventListener('mouseleave', () => { isSlicing = false; bladeTrail = []; });

// TOUCH (Fixed for Mobile)
canvas.addEventListener('touchstart', (e) => {
    e.preventDefault(); // Stop mobile screen scrolling
    isSlicing = true;
    bladeTrail = [];
    const touch = e.touches[0];
    updateBlade(touch.clientX, touch.clientY);
}, { passive: false });

canvas.addEventListener('touchmove', (e) => {
    e.preventDefault();
    if (isSlicing) {
        const touch = e.touches[0];
        updateBlade(touch.clientX, touch.clientY);
        if(frame % 5 === 0) playSwoosh(); // Play swoosh sound occasionally when swiping
    }
}, { passive: false });

canvas.addEventListener('touchend', (e) => {
    e.preventDefault();
    isSlicing = false;
    bladeTrail = [];
}, { passive: false });


/**
 * GAME ENTITIES
 */
class Fruit {
    constructor() {
        this.radius = Math.random() * 20 + 40; // Size 40-60
        this.x = Math.random() * (width - this.radius * 2) + this.radius;
        this.y = height + this.radius;
        
        // Push towards center
        const toCenter = (width / 2) - this.x;
        this.vx = (toCenter / width) * (Math.random() * 10 + 5); 
        this.vy = -(Math.random() * (jumpVelocityMax - jumpVelocityMin) + jumpVelocityMin);
        
        this.rotation = 0;
        this.rotationSpeed = (Math.random() - 0.5) * 0.2;
        
        this.isBomb = Math.random() < bombChance;
        this.sliced = false;
    }

    update() {
        this.x += this.vx;
        this.y += this.vy;
        this.vy += gravity; // Gravity applied here
        this.rotation += this.rotationSpeed;
    }

    draw(ctx) {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.rotation);

        if (this.isBomb) {
            // Draw Rambutan Bomb
            ctx.beginPath();
            ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
            ctx.fillStyle = '#222'; // Black core
            ctx.fill();
            
            // Red spikes (Rambutan hair)
            for(let i=0; i<12; i++) {
                ctx.rotate((Math.PI * 2) / 12);
                ctx.beginPath();
                ctx.moveTo(0, this.radius - 5);
                ctx.lineTo(-5, this.radius + 15);
                ctx.lineTo(5, this.radius + 15);
                ctx.fillStyle = '#FF0000';
                ctx.fill();
            }
        } else {
            // Draw Durian
            ctx.beginPath();
            ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
            ctx.fillStyle = '#6B8E23'; // Olive green shell
            ctx.fill();
            
            // Spikes
            for(let i=0; i<16; i++) {
                ctx.rotate((Math.PI * 2) / 16);
                ctx.beginPath();
                ctx.moveTo(-10, this.radius - 5);
                ctx.lineTo(0, this.radius + 15);
                ctx.lineTo(10, this.radius - 5);
                ctx.fillStyle = '#556B2F';
                ctx.fill();
            }

            // If we wanted half durians to fall, we'd handle it here. 
            // For arcade speed, we just destroy it and spawn particles.
        }

        ctx.restore();
    }
}

class Particle {
    constructor(x, y, color) {
        this.x = x;
        this.y = y;
        this.vx = (Math.random() - 0.5) * 10;
        this.vy = (Math.random() - 0.5) * 10;
        this.life = 1.0;
        this.color = color;
        this.size = Math.random() * 10 + 5;
    }
    update() {
        this.x += this.vx;
        this.y += this.vy;
        this.vy += 0.2; // particle gravity
        this.life -= 0.02;
    }
    draw(ctx) {
        ctx.globalAlpha = Math.max(0, this.life);
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
        ctx.fill();
        ctx.globalAlpha = 1.0;
    }
}

/**
 * LOGIC & COLLISION
 */
function spawnFruit() {
    fruits.push(new Fruit());
}

function createExplosion(x, y, isBomb) {
    const colors = isBomb ? ['#FF0000', '#222222', '#FFA500'] : ['#FFD700', '#FFFACD', '#6B8E23', '#556B2F'];
    for(let i = 0; i < 30; i++) {
        let color = colors[Math.floor(Math.random() * colors.length)];
        particles.push(new Particle(x, y, color));
    }
}

// Check if blade line intersects fruit circle
function checkCollisions() {
    if (bladeTrail.length < 2) return;
    
    let p1 = bladeTrail[bladeTrail.length - 2];
    let p2 = bladeTrail[bladeTrail.length - 1];

    for (let i = fruits.length - 1; i >= 0; i--) {
        let f = fruits[i];
        
        // Basic distance check from line segment to circle center
        let dist = distToSegment(f, p1, p2);
        
        if (dist < f.radius && !f.sliced) {
            f.sliced = true;
            
            if (f.isBomb) {
                playBoom();
                createExplosion(f.x, f.y, true);
                loseLife();
            } else {
                playSplat();
                createExplosion(f.x, f.y, false);
                score += 10;
                updateHUD();
                increaseDifficulty();
            }
            
            fruits.splice(i, 1); // Remove fruit
        }
    }
}

// Math helper for slicing line collision
function distToSegment(p, v, w) {
    let l2 = (w.x - v.x)**2 + (w.y - v.y)**2;
    if (l2 === 0) return Math.hypot(p.x - v.x, p.y - v.y);
    let t = ((p.x - v.x) * (w.x - v.x) + (p.y - v.y) * (w.y - v.y)) / l2;
    t = Math.max(0, Math.min(1, t));
    return Math.hypot(p.x - (v.x + t * (w.x - v.x)), p.y - (v.y + t * (w.y - v.y)));
}

function increaseDifficulty() {
    // Slowly increase speed, gravity, and bomb chance as score goes up
    if (score % 50 === 0) {
        spawnRate = Math.max(30, spawnRate - 5); // Spawns faster (lower frame delay)
        bombChance = Math.min(0.3, bombChance + 0.02); // More bombs
        gravity = Math.min(0.25, gravity + 0.01); // Falls faster
        jumpVelocityMin += 0.2; // Shoots up higher
        jumpVelocityMax += 0.2;
    }
}

function loseLife() {
    lives--;
    updateHUD();
    
    // Screen flash effect
    ctx.fillStyle = 'rgba(255, 0, 0, 0.5)';
    ctx.fillRect(0, 0, width, height);

    if (lives <= 0) {
        endGame();
    }
}

function updateHUD() {
    scoreBoard.innerText = `Score: ${score}`;
    let hearts = "";
    for(let i=0; i<lives; i++) hearts += "💛";
    livesBoard.innerText = `Lives: ${lives} ${hearts}`;
}

/**
 * GAME LOOP
 */
function drawBlade() {
    if (bladeTrail.length < 2) return;
    
    ctx.beginPath();
    ctx.moveTo(bladeTrail[0].x, bladeTrail[0].y);
    for (let i = 1; i < bladeTrail.length; i++) {
        ctx.lineTo(bladeTrail[i].x, bladeTrail[i].y);
    }
    
    // Glowing green trail
    ctx.strokeStyle = '#32CD32';
    ctx.lineWidth = 8;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.shadowBlur = 15;
    ctx.shadowColor = '#FFD700'; // Gold shadow for durian essence
    ctx.stroke();
    ctx.shadowBlur = 0; // reset
}

function loop() {
    if (!isPlaying) return;
    
    requestAnimationFrame(loop);
    
    // Background (Dark Jungle Green)
    ctx.fillStyle = '#1b2a1a';
    ctx.fillRect(0, 0, width, height);

    // Spawning
    if (frame % spawnRate === 0) {
        spawnFruit();
    }

    // Update & Draw Fruits
    for (let i = fruits.length - 1; i >= 0; i--) {
        let f = fruits[i];
        f.update();
        f.draw(ctx);
        
        // Remove if falls off screen
        if (f.y > height + f.radius * 2) {
            if (!f.isBomb && !f.sliced) {
                loseLife(); // Lose life for missing a durian!
            }
            fruits.splice(i, 1);
        }
    }

    // Update & Draw Particles
    for (let i = particles.length - 1; i >= 0; i--) {
        let p = particles[i];
        p.update();
        p.draw(ctx);
        if (p.life <= 0) particles.splice(i, 1);
    }

    drawBlade();
    
    frame++;
}

/**
 * GAME FLOW CONTROLS
 */
async function startGame() {
    // Start Audio Context on user gesture
    await Tone.start();
    initAudio();
    Tone.Transport.start();

    // Reset variables
    score = 0;
    lives = 3;
    fruits = [];
    particles = [];
    frame = 0;
    spawnRate = 100; 
    bombChance = 0.1;
    gravity = 0.15;
    jumpVelocityMin = 12;
    jumpVelocityMax = 18;
    
    updateHUD();

    // UI Updates
    menu.style.display = 'none';
    gameOverScreen.style.display = 'none';
    hud.style.display = 'flex';
    
    isPlaying = true;
    loop();
}

function endGame() {
    isPlaying = false;
    Tone.Transport.stop(); // Stop music
    
    hud.style.display = 'none';
    gameOverScreen.style.display = 'flex';
    finalScoreDisplay.innerText = `You Scored: ${score}`;
}

// Event Listeners
startBtn.addEventListener('click', startGame);
restartBtn.addEventListener('click', startGame);

</script>
</body>
</html>
